name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosaurus/flutter-action@v2
        with:
          flutter-version: stable

      - run: flutter pub get
      - run: flutter format --set-exit-if-changed .
      - run: flutter test
      - run: flutter build appbundle --release
